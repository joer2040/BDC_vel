<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 1200 1000" width="1200" height="1000"
     font-family="Segoe UI, Arial, sans-serif" font-size="12">

  <!-- Background -->
  <rect width="1200" height="1000" fill="#f8f9fa"/>

  <!-- Title -->
  <text x="600" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">
    SAP Data Architecture — Accrual Matching Join Model
  </text>

  <!-- ============================================================ -->
  <!-- LAYER 1: Journal Entry Header                                 -->
  <!-- ============================================================ -->
  <g id="journalentryheader">
    <rect x="250" y="50" width="700" height="100" rx="8" ry="8"
          fill="#1e3a5f" stroke="#0f2744" stroke-width="2"/>
    <text x="600" y="75" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">
      raw_journalentry (HEADER) [journalentryheader]
    </text>
    <text x="600" y="95" text-anchor="middle" font-size="11" fill="#a8d0e6">
      LedgerGroup='0L', AccountingDocumentClass IN ('WE','RE')
    </text>
    <text x="600" y="115" text-anchor="middle" font-size="11" fill="#cce5ff">
      PostingDate | CompanyCode | AccountingDocument | FiscalYear
    </text>
    <text x="600" y="135" text-anchor="middle" font-size="10" fill="#ffdd57">
      INNER JOIN ON CompanyCode + AccountingDocument + FiscalYear
    </text>
  </g>

  <!-- Arrow: Header → Line Items -->
  <g id="arrow-header-to-lineitems">
    <line x1="600" y1="150" x2="600" y2="185" stroke="#ffdd57" stroke-width="2"
          marker-end="url(#arrowhead-yellow)"/>
    <text x="615" y="172" font-size="9" fill="#555">INNER JOIN</text>
  </g>

  <!-- ============================================================ -->
  <!-- LAYER 2: Operational Acctg Doc Item (Line Items)              -->
  <!-- ============================================================ -->
  <g id="operationalacctgdocitem">
    <rect x="200" y="190" width="800" height="110" rx="8" ry="8"
          fill="#2d6a4f" stroke="#1b4332" stroke-width="2"/>
    <text x="600" y="215" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">
      raw_operationalacctgdocitem (LINE ITEMS) [operationalacctgdocitem]
    </text>
    <text x="600" y="240" text-anchor="middle" font-size="11" fill="#b7e4c7">
      DebitCreditCode | GLAccount | AmountInCompanyCodeCurrency
    </text>
    <text x="600" y="260" text-anchor="middle" font-size="11" fill="#b7e4c7">
      PurchasingDocument | PurchasingDocumentItem | PurchaseOrderQty
    </text>
    <text x="600" y="280" text-anchor="middle" font-size="11" fill="#b7e4c7">
      Supplier
    </text>
    <text x="600" y="295" text-anchor="middle" font-size="10" fill="#ffdd57">
      LEFT JOINs (enrichment) ▼
    </text>
  </g>

  <!-- Arrows: Line Items → Enrichment tables -->
  <g id="arrows-enrichment">
    <!-- Left branch -->
    <polyline points="400,300 400,340 200,340 200,380"
              fill="none" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrowhead-gray)"/>
    <!-- Center branch -->
    <line x1="600" y1="300" x2="600" y2="380"
          stroke="#aaa" stroke-width="1.5" marker-end="url(#arrowhead-gray)"/>
    <!-- Right branch -->
    <polyline points="800,300 800,340 1000,340 1000,380"
              fill="none" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrowhead-gray)"/>
  </g>

  <!-- ============================================================ -->
  <!-- LAYER 3: Enrichment Tables (LEFT JOINs)                       -->
  <!-- ============================================================ -->

  <!-- Supplier Invoice -->
  <g id="supplierinvoice">
    <rect x="70" y="385" width="260" height="110" rx="6" ry="6"
          fill="#5a189a" stroke="#3c096c" stroke-width="1.5"/>
    <text x="200" y="410" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">
      raw_supplierinvoice
    </text>
    <text x="200" y="428" text-anchor="middle" font-size="10" fill="#e0aaff">
      [supplierinvoice]
    </text>
    <text x="200" y="450" text-anchor="middle" font-size="11" fill="#f0d9ff">
      InvoicingParty ★ (Supplier AUTH)
    </text>
    <text x="200" y="470" text-anchor="middle" font-size="10" fill="#d4b8e8">
      JOIN ON CompanyCode + AccountingDocument
    </text>
    <text x="200" y="488" text-anchor="middle" font-size="10" fill="#d4b8e8">
      + FiscalYear
    </text>
  </g>

  <!-- Purchase Order -->
  <g id="purchaseorder">
    <rect x="470" y="385" width="260" height="110" rx="6" ry="6"
          fill="#5a189a" stroke="#3c096c" stroke-width="1.5"/>
    <text x="600" y="410" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">
      raw_purchaseorder
    </text>
    <text x="600" y="428" text-anchor="middle" font-size="10" fill="#e0aaff">
      [purchaseorder]
    </text>
    <text x="600" y="450" text-anchor="middle" font-size="11" fill="#f0d9ff">
      Supplier (fallback)
    </text>
    <text x="600" y="470" text-anchor="middle" font-size="11" fill="#f0d9ff">
      DocumentCurrency
    </text>
    <text x="600" y="488" text-anchor="middle" font-size="10" fill="#d4b8e8">
      JOIN ON PurchasingDocument
    </text>
  </g>

  <!-- Purchase Order Item -->
  <g id="purchaseorderitem">
    <rect x="870" y="385" width="270" height="110" rx="6" ry="6"
          fill="#5a189a" stroke="#3c096c" stroke-width="1.5"/>
    <text x="1005" y="410" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">
      raw_purchaseorderitem
    </text>
    <text x="1005" y="428" text-anchor="middle" font-size="10" fill="#e0aaff">
      [purchaseorder]
    </text>
    <text x="1005" y="450" text-anchor="middle" font-size="11" fill="#f0d9ff">
      OrderQuantity ★ | NetAmount
    </text>
    <text x="1005" y="470" text-anchor="middle" font-size="11" fill="#f0d9ff">
      PurchaseOrderItemText
    </text>
    <text x="1005" y="488" text-anchor="middle" font-size="10" fill="#d4b8e8">
      JOIN ON PO + POItem
    </text>
  </g>

  <!-- ============================================================ -->
  <!-- LAYER 4: Additional Enrichment                                -->
  <!-- ============================================================ -->

  <!-- Arrows to Layer 4 -->
  <g id="arrows-layer4">
    <line x1="300" y1="495" x2="300" y2="560"
          stroke="#aaa" stroke-width="1.5" marker-end="url(#arrowhead-gray)"/>
    <line x1="850" y1="495" x2="850" y2="560"
          stroke="#aaa" stroke-width="1.5" marker-end="url(#arrowhead-gray)"/>
  </g>

  <!-- PO Account Assignment -->
  <g id="purchaseorderaccountassignment">
    <rect x="100" y="565" width="310" height="100" rx="6" ry="6"
          fill="#b5651d" stroke="#8b4513" stroke-width="1.5"/>
    <text x="255" y="590" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">
      raw_purchaseorderaccountassignment
    </text>
    <text x="255" y="608" text-anchor="middle" font-size="10" fill="#ffdab9">
      [purchaseorder]
    </text>
    <text x="255" y="630" text-anchor="middle" font-size="11" fill="#fff3e0">
      GLAccount ★ (authoritative)
    </text>
    <text x="255" y="650" text-anchor="middle" font-size="10" fill="#ffdab9">
      JOIN ON PO + POItem
    </text>
  </g>

  <!-- Company Code -->
  <g id="companycode">
    <rect x="680" y="565" width="310" height="100" rx="6" ry="6"
          fill="#b5651d" stroke="#8b4513" stroke-width="1.5"/>
    <text x="835" y="590" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">
      raw_companycode
    </text>
    <text x="835" y="608" text-anchor="middle" font-size="10" fill="#ffdab9">
      [companycode]
    </text>
    <text x="835" y="630" text-anchor="middle" font-size="11" fill="#fff3e0">
      Currency (CompanyCodeCurrency)
    </text>
    <text x="835" y="650" text-anchor="middle" font-size="11" fill="#fff3e0">
      CompanyCodeName
    </text>
    <text x="835" y="660" text-anchor="middle" font-size="10" fill="#ffdab9">
      JOIN ON CompanyCode
    </text>
  </g>

  <!-- ============================================================ -->
  <!-- LAYER 5: Validation Table                                     -->
  <!-- ============================================================ -->

  <!-- Arrow to Debit Credit -->
  <g id="arrow-to-debitcredit">
    <line x1="255" y1="665" x2="255" y2="720"
          stroke="#aaa" stroke-width="1.5" marker-end="url(#arrowhead-gray)"/>
  </g>

  <!-- Debit Credit Code -->
  <g id="debitcreditcode">
    <rect x="100" y="725" width="310" height="90" rx="6" ry="6"
          fill="#c62828" stroke="#8e0000" stroke-width="1.5"/>
    <text x="255" y="750" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">
      raw_debitcreditcode
    </text>
    <text x="255" y="768" text-anchor="middle" font-size="10" fill="#ffcdd2">
      [journalentryitemcodes]
    </text>
    <text x="255" y="790" text-anchor="middle" font-size="11" fill="#ffebee">
      INNER JOIN = validation
    </text>
    <text x="255" y="805" text-anchor="middle" font-size="10" fill="#ffcdd2">
      DebitCreditCode
    </text>
  </g>

  <!-- ============================================================ -->
  <!-- LEGEND                                                        -->
  <!-- ============================================================ -->
  <g id="legend">
    <rect x="700" y="730" width="320" height="140" rx="8" ry="8"
          fill="#ffffff" stroke="#333" stroke-width="1.5"/>
    <text x="860" y="755" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">
      Legend
    </text>
    <!-- Star -->
    <text x="720" y="780" font-size="11" fill="#333">★ = Authoritative source</text>
    <text x="720" y="800" font-size="11" fill="#333">(fb) = Fallback source</text>
    <!-- Supplier Priority -->
    <text x="720" y="825" font-size="11" font-weight="bold" fill="#5a189a">SUPPLIER ORDER:</text>
    <text x="720" y="842" font-size="10" fill="#555">1. supplierinvoice → 2. purchaseorder → 3. acctgdocitem</text>
    <!-- GL Account Priority -->
    <text x="720" y="862" font-size="11" font-weight="bold" fill="#b5651d">GL ACCOUNT ORDER:</text>
    <text x="720" y="879" font-size="10" fill="#555">1. PO account assignment → 2. acctgdocitem</text>

    <!-- Color key -->
    <rect x="720" y="890" width="12" height="12" fill="#1e3a5f"/>
    <text x="738" y="901" font-size="9" fill="#333">Header</text>
    <rect x="790" y="890" width="12" height="12" fill="#2d6a4f"/>
    <text x="808" y="901" font-size="9" fill="#333">Line Items</text>
    <rect x="880" y="890" width="12" height="12" fill="#5a189a"/>
    <text x="898" y="901" font-size="9" fill="#333">Enrichment</text>
    <rect x="970" y="890" width="12" height="12" fill="#b5651d"/>
    <text x="988" y="901" font-size="9" fill="#333">Secondary</text>
  </g>

  <!-- ============================================================ -->
  <!-- ARROWHEAD MARKERS                                             -->
  <!-- ============================================================ -->
  <defs>
    <marker id="arrowhead-yellow" markerWidth="10" markerHeight="7"
            refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ffdd57"/>
    </marker>
    <marker id="arrowhead-gray" markerWidth="10" markerHeight="7"
            refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#888"/>
    </marker>
  </defs>

</svg>
